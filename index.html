<style>
  html, body, #root { margin: 0; padding: 0; min-height: 100%; background: #0a0f1e; }
  * { box-sizing: border-box; }
  :root {
    --bg: #0a0f1e; --surface: #111827; --surface-2: #1a2236; --line: #1e2d45;
    --text: #e8edf7; --muted: #6b7fa3; --accent: #38bdf8;
    --accent-soft: rgba(56,189,248,0.12); --good: #34d399; --good-soft: rgba(52,211,153,0.12);

  body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }

  .wt-status-pill { font-size: 12px; color: var(--muted); border: 1px solid var(--line); border-radius: 20px; padding: 5px 10px; display: flex; align-items: center; gap: 5px; }
  .wt-status-pill.ready { border-color: rgba(52,211,153,0.4); color: var(--good); }
  .wt-status-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .wt-status { font-size: 12.5px; padding: 4px 0; margin-bottom: 8px; }
  .wt-status.error { color: #f87171; } .wt-status.success { color: var(--good); } .wt-status.pending { color: var(--muted); }
  .wt-date { width: 100%; background: var(--surface); border: 1px solid var(--line); border-radius: 8px; color: var(--text); padding: 9px 12px; font-size: 15px; font-family: 'Inter', sans-serif; margin-bottom: 16px; }
  .wt-date::-webkit-calendar-picker-indicator { filter: invert(0.6) sepia(1) saturate(3) hue-rotate(175deg); }

  .wt-day-btn { flex: 1; background: var(--surface); border: 1px solid var(--line); border-radius: 10px; padding: 10px 8px; cursor: pointer; text-align: left; transition: border-color 0.15s, background 0.15s; }
  .wt-day-btn.active { border-color: var(--accent); background: var(--accent-soft); }

  .wt-day-btn.active .wt-day-label { color: var(--accent); }
  .wt-day-sub { font-size: 11px; color: var(--muted); margin-top: 2px; opacity: 0.7; }
  .wt-bar-wrap { display: flex; align-items: center; gap: 8px; margin-bottom: 18px; }
  .wt-bar-track { flex: 1; height: 3px; background: var(--line); border-radius: 2px; position: relative; overflow: hidden; }
  .wt-bar-fill { position: absolute; inset: 0; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }
  .wt-bar-count { font-family: 'Oswald', sans-serif; font-size: 12px; color: var(--muted); letter-spacing: 0.04em; white-space: nowrap; }

function todayISO() {
  const d = new Date();
  return new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().slice(0, 10);
}

// Firebase loader — avoids module/babel timing conflicts
function useFirebase() {
  const [db, setDb] = useState(null);
  useEffect(() => {
    const script = document.createElement('script');
    script.type = 'module';
    script.textContent = `
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
      import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
      const app = initializeApp(${JSON.stringify(FIREBASE_CONFIG)});
      const db = getFirestore(app);
      window.__db = db;
      window.__fbFns = { collection, addDoc, getDocs, query, orderBy };
      window.dispatchEvent(new Event('fb-ready'));
    `;
    document.head.appendChild(script);
    const handler = () => setDb(window.__db);
    window.addEventListener('fb-ready', handler, { once: true });
    return () => window.removeEventListener('fb-ready', handler);
  }, []);
  return db;
}

function VideoModal({ videos, formNotes, onClose }) {
  const [active, setActive] = useState(0);
  return (
    <div className="wt-modal-overlay" onClick={onClose}>
      <div className="wt-modal" onClick={e => e.stopPropagation()}>
        <div className="wt-modal-handle" />
        <div className="wt-video-toggle">
          {['Front','Side'].map((l,i) => (
            <button key={i} className={`wt-toggle-btn${active===i?' active':''}`} onClick={() => setActive(i)}>{l}</button>
          ))}
        </div>
        <video key={videos[active]} src={videos[active]} autoPlay loop muted playsInline className="wt-modal-video" />
        {formNotes && <ul className="wt-modal-notes">{formNotes.map((n,i) => <li key={i}>{n}</li>)}</ul>}
        <button className="wt-modal-close" onClick={onClose}>Close</button>
      </div>
    </div>
  );
}

function BulletList({ text }) {
  return <ul className="wt-bullets">{text.split('·').map(s=>s.trim()).filter(Boolean).map((s,i)=><li key={i}>{s}</li>)}</ul>;
}

function Collapsible({ title, children }) {
  const [open, setOpen] = useState(false);
  return (
    <div className="wt-collapsible">
      <div className="wt-collapsible-head" onClick={() => setOpen(o => !o)}>
        <span className="wt-collapsible-title">{title}</span>
        <span className={`wt-collapsible-chevron${open?' open':''}`}>⌄</span>
      </div>
      {open && <div className="wt-collapsible-body">{children}</div>}
    </div>
  );
}

function LineChart({ data, color, gradId }) {
  if (!data || data.length < 1) return null;
  const W=320, H=140, PL=42, PR=8, PT=8, PB=28;
  const vals = data.map(d=>d.v);
  const minV = Math.min(...vals), maxV = Math.max(...vals);
  const range = maxV - minV || 1;
  const xs = data.map((_,i) => PL + (i/Math.max(data.length-1,1))*(W-PL-PR));
  const ys = data.map(d => PT + (1-(d.v-minV)/range)*(H-PT-PB));
  const line = xs.map((x,i) => `${i===0?'M':'L'}${x.toFixed(1)},${ys[i].toFixed(1)}`).join(' ');
  const area = line + ` L${xs[xs.length-1].toFixed(1)},${(H-PB).toFixed(1)} L${xs[0].toFixed(1)},${(H-PB).toFixed(1)} Z`;
  const ticks = [minV, minV+range*0.5, maxV].map(v=>Math.round(v));
  const xLabels = data.length<=5 ? data : [data[0], data[Math.floor(data.length/2)], data[data.length-1]];
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',overflow:'visible'}}>
      <defs>
        <linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.35"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      {ticks.map((t,i) => {
        const y = PT + (1-(t-minV)/range)*(H-PT-PB);
        return <g key={i}>
          <line x1={PL} y1={y.toFixed(1)} x2={W-PR} y2={y.toFixed(1)} stroke="var(--line)" strokeWidth="1" strokeDasharray="3,3"/>
          <text x={PL-4} y={y+3} className="pg-axis-label" textAnchor="end">{t}</text>
        </g>;
      })}
      {xLabels.map((d,i) => {
        const idx = data.indexOf(d);
        return <text key={i} x={xs[idx].toFixed(1)} y={H-4} className="pg-axis-label" textAnchor="middle">{d.label}</text>;
      })}
      <path d={area} fill={`url(#${gradId})`}/>
      <path d={line} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>
      {xs.map((x,i) => <circle key={i} cx={x.toFixed(1)} cy={ys[i].toFixed(1)} r="3" fill={color}/>)}
    </svg>
  );
}

function ProgressTab({ allLogs }) {
  const [selectedEx, setSelectedEx] = useState(ALL_EXERCISES[0]);
  const [chartType, setChartType] = useState('weight');
  const exLogs = allLogs.filter(d => d.exercise===selectedEx && d.weight).sort((a,b)=>a.date.localeCompare(b.date));
  const weightData = exLogs.map(d => ({ label: d.date.slice(5), v: parseFloat(d.weight)||0 }));
  const volumeData = exLogs.map(d => ({ label: d.date.slice(5), v: (parseFloat(d.sets)||0)*(parseFloat(d.reps)||0)*(parseFloat(d.weight)||0) }));
  const data = chartType==='weight' ? weightData : volumeData;
  const unit = chartType==='weight' ? 'lbs' : 'vol';
  const best = data.length ? Math.max(...data.map(d=>d.v)) : null;
  const latest = data.length ? data[data.length-1].v : null;
  const gain = data.length>=2 ? data[data.length-1].v - data[0].v : null;
  return (
    <div className="pg-root">
      <h1 className="pg-title">Pro<span>gress</span></h1>
      <div className="pg-subtitle">{allLogs.length} entries logged</div>
      <select className="pg-select" value={selectedEx} onChange={e=>setSelectedEx(e.target.value)}>
        {ALL_EXERCISES.map(ex=><option key={ex} value={ex}>{ex}</option>)}
      </select>
      <div className="pg-chart-toggle">
        <button className={`pg-toggle-btn${chartType==='weight'?' active':''}`} onClick={()=>setChartType('weight')}>Weight</button>
        <button className={`pg-toggle-btn${chartType==='volume'?' active':''}`} onClick={()=>setChartType('volume')}>Volume</button>
      </div>
      {data.length===0 ? (
        <div className="pg-empty">No data yet for {selectedEx}.</div>
      ) : (
        <>
          <div className="pg-stat-row">
            <div className="pg-stat"><div className="pg-stat-label">Latest</div><div className="pg-stat-value">{Math.round(latest)}<span className="pg-stat-unit">{unit}</span></div></div>
            <div className="pg-stat"><div className="pg-stat-label">Best</div><div className="pg-stat-value">{Math.round(best)}<span className="pg-stat-unit">{unit}</span></div></div>
            <div className="pg-stat"><div className="pg-stat-label">Gained</div><div className="pg-stat-value">{gain!==null?(gain>=0?'+':'')+Math.round(gain):'—'}<span className="pg-stat-unit">{unit}</span></div></div>
          </div>
          <div className="pg-card">
            <div className="pg-card-title">{chartType==='weight'?'Weight over time':'Volume over time'}</div>
            <LineChart data={data} color={chartType==='weight'?'#38bdf8':'#34d399'} gradId={chartType==='weight'?'grad1':'grad2'}/>
          </div>
        </>
      )}
    </div>
  );
}

function App() {
  const db = useFirebase();
  const [tab, setTab] = useState('workout');
  const [dayKey, setDayKey] = useState('day1');
  const [date, setDate] = useState(todayISO());
  const [logs, setLogs] = useState({});
  const [modal, setModal] = useState(null);
  const [lastWeights, setLastWeights] = useState({});
  const [allLogs, setAllLogs] = useState([]);
  const [status, setStatus] = useState(null);

  useEffect(() => {
    if (!db) return;
    (async () => {
      try {
        const { collection, getDocs, query, orderBy } = window.__fbFns;
        const q = query(collection(db, 'workoutLogs'), orderBy('date','asc'));
        const snap = await getDocs(q);
        const map = {}, logs = [];
        snap.forEach(doc => {
          const d = doc.data();
          logs.push(d);
          if (d.exercise && d.weight) map[d.exercise] = { weight: d.weight, date: d.date };
        });
        setLastWeights(map);
        setAllLogs(logs);
      } catch(e) {}
    })();
  }, [db]);

  const updateField = (id, field, value) => {
    setLogs(prev => ({ ...prev, [id]: { ...prev[id], [field]: value, saved: false } }));
  };

  const logExercise = async (ex) => {
    if (!db) { setStatus({ type:'error', text:'Database not ready yet.' }); return; }
    const entry = logs[ex.id] || {};
    setStatus({ type:'pending', text:`Saving ${ex.name}…` });
    try {
      const { collection, addDoc } = window.__fbFns;
      const newEntry = { date, day: PLAN[dayKey].label, exercise: ex.name, sets: entry.sets||'', reps: entry.reps||'', weight: entry.weight||'', notes: entry.notes||'', createdAt: new Date().toISOString() };
      await addDoc(collection(db,'workoutLogs'), newEntry);
      setLogs(prev => ({ ...prev, [ex.id]: { ...prev[ex.id], saved: true } }));
      if (entry.weight) setLastWeights(prev => ({ ...prev, [ex.name]: { weight: entry.weight, date } }));
      setAllLogs(prev => [...prev, newEntry]);
      setStatus({ type:'success', text:`${ex.name} logged.` });
    } catch(e) {
      setStatus({ type:'error', text:`Couldn't save: ${e.message}` });
    }
  };

  const exportCSV = async () => {
    if (!db) return;
    try {
      const { collection, getDocs, query, orderBy } = window.__fbFns;
      const q = query(collection(db,'workoutLogs'), orderBy('date','asc'));
      const snap = await getDocs(q);
      const rows = [['Date','Day','Exercise','Sets','Reps','Weight','Notes']];
      snap.forEach(doc => { const d=doc.data(); rows.push([d.date,d.day,d.exercise,d.sets,d.reps,d.weight,d.notes]); });
      const csv = rows.map(r=>r.map(v=>`"${(v||'').toString().replace(/"/g,'""')}"`).join(',')).join('\n');
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
      a.download = `benchmarks-${todayISO()}.csv`;
      a.click();
      setStatus({ type:'success', text:'CSV exported.' });
    } catch(e) { setStatus({ type:'error', text:'Export failed.' }); }
  };

  const plan = PLAN[dayKey];
  const loggedCount = plan.exercises.filter(ex => logs[ex.id]?.saved).length;

  return (
    <div style={{minHeight:'100vh',background:'var(--bg)'}}>
      {tab === 'progress' ? (
        <ProgressTab allLogs={allLogs} />
      ) : (
        <div className="wt-root">
          <div className="wt-header">
            <h1 className="wt-title">Bench<span>marks</span></h1>
            <div className="wt-header-right">
              <button className="wt-export-btn" onClick={exportCSV}>Export CSV</button>
              <div className={`wt-status-pill${db?' ready':''}`}>
                <span className="dot"/>
                {db ? 'Live' : 'Connecting…'}
              </div>
            </div>
          </div>

          {status && <div className={`wt-status ${status.type}`}>{status.text}</div>}

          <input className="wt-date" type="date" value={date} onChange={e=>setDate(e.target.value)} />

          <div className="wt-days">
            {Object.entries(PLAN).map(([key,d]) => (
              <button key={key} className={`wt-day-btn${dayKey===key?' active':''}`} onClick={()=>setDayKey(key)}>
                <div className="wt-day-label">{d.label}</div>
                <div className="wt-day-sub">{d.sub}</div>
              </button>
            ))}
          </div>

          <div className="wt-bar-wrap">
            <div className="wt-bar-track"><div className="wt-bar-fill" style={{width:`${(loggedCount/plan.exercises.length)*100}%`}}/></div>
            <div className="wt-bar-count">{loggedCount}/{plan.exercises.length} logged</div>
          </div>

          <Collapsible title="Warm-up (7 min)"><BulletList text={plan.warmup}/></Collapsible>

          {plan.exercises.map(ex => {
            const entry = logs[ex.id] || {};
            return (
              <div key={ex.id} className={`wt-exercise${entry.saved?' saved':''}`}>
                <div className="wt-exercise-head">
                  <div>
                    <div className="wt-exercise-name">{ex.name}</div>
                    <div className="wt-exercise-meta">{ex.scheme} · {ex.rest}</div>
                    {lastWeights[ex.name] && <div className="wt-exercise-last">Last: {lastWeights[ex.name].weight} lbs · {lastWeights[ex.name].date}</div>}
                  </div>
                  {ex.videos && <button className="wt-video-link" onClick={()=>setModal(ex)}>▶</button>}
                </div>
                <div className="wt-field-grid">
                  <div className="wt-field"><label>Sets</label><input type="text" inputMode="numeric" placeholder={ex.scheme.split('×')[0].trim()} value={entry.sets||''} onChange={e=>updateField(ex.id,'sets',e.target.value)}/></div>
                  <div className="wt-field"><label>Reps</label><input type="text" inputMode="numeric" value={entry.reps||''} onChange={e=>updateField(ex.id,'reps',e.target.value)}/></div>
                  <div className="wt-field"><label>Weight</label><input type="text" inputMode="decimal" placeholder="lbs" value={entry.weight||''} onChange={e=>updateField(ex.id,'weight',e.target.value)}/></div>
                </div>
                <div className="wt-notes-row">
                  <div className="wt-field"><label>Notes</label><input type="text" value={entry.notes||''} onChange={e=>updateField(ex.id,'notes',e.target.value)}/></div>
                  <button className={`wt-log-btn${entry.saved?' saved':''}`} onClick={()=>logExercise(ex)}>{entry.saved?'✓ Logged':'Log'}</button>
                </div>
              </div>
            );
          })}

          <Collapsible title="Finisher"><BulletList text={plan.finisher}/></Collapsible>
        </div>
      )}

      {modal && <VideoModal videos={modal.videos} formNotes={modal.formNotes} onClose={()=>setModal(null)}/>}

      <nav className="wt-nav">
        <button className={`wt-nav-btn${tab==='workout'?' active':''}`} onClick={()=>setTab('workout')}>
          <span className="wt-nav-icon">🏋️</span>Workout
        </button>
        <button className={`wt-nav-btn${tab==='progress'?' active':''}`} onClick={()=>setTab('progress')}>
          <span className="wt-nav-icon">📈</span>Progress
        </button>
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
