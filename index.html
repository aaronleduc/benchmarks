<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Benchmarks" />
<link rel="apple-touch-icon" href="icon.png" />
<link rel="icon" href="icon.png" />
<meta name="theme-color" content="#15151a" />
<title>Benchmarks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body, #root { margin: 0; padding: 0; min-height: 100%; background: #15151a; }
  * { box-sizing: border-box; }

  .wt-root {
    --bg: #15151a;
    --surface: #1f2024;
    --surface-2: #2a2b31;
    --line: #35363d;
    --text: #ededea;
    --muted: #8e8d96;
    --accent: #ff5a36;
    --accent-soft: rgba(255, 90, 54, 0.16);
    --good: #4ade80;
    --good-soft: rgba(74, 222, 128, 0.14);
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    width: 100%;
    padding: calc(18px + env(safe-area-inset-top)) 16px 48px;
    -webkit-font-smoothing: antialiased;
  }

  .wt-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 16px; }
  .wt-title { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 26px; letter-spacing: 0.04em; text-transform: uppercase; margin: 0; }
  .wt-title span { color: var(--accent); }
  .wt-sheet-link { font-size: 12px; color: var(--muted); text-decoration: none; border: 1px solid var(--line); border-radius: 6px; padding: 6px 10px; white-space: nowrap; transition: border-color 0.15s, color 0.15s; }
  .wt-sheet-link:hover { border-color: var(--accent); color: var(--text); }

  .wt-connect-row { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
  .wt-connect-btn { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 13px; border: none; border-radius: 8px; padding: 9px 16px; cursor: pointer; transition: filter 0.15s, transform 0.05s; }
  .wt-connect-btn:active { transform: scale(0.98); }
  .wt-connect-btn.connected { background: var(--good-soft); color: var(--good); border: 1px solid rgba(74, 222, 128, 0.35); }
  .wt-connect-btn.disconnected { background: var(--accent); color: #1a0f0b; }
  .wt-connect-btn.disconnected:hover { filter: brightness(1.08); }
  .wt-connect-btn:disabled { opacity: 0.5; cursor: wait; }

  .wt-status { font-size: 12.5px; padding: 4px 0; }
  .wt-status.error { color: var(--accent); }
  .wt-status.success { color: var(--good); }
  .wt-status.pending { color: var(--muted); }

  .wt-controls { display: flex; gap: 10px; align-items: stretch; margin-bottom: 16px; flex-wrap: wrap; }
  .wt-date { background: var(--surface); border: 1px solid var(--line); border-radius: 8px; color: var(--text); padding: 9px 12px; font-size: 15px; font-family: 'Inter', sans-serif; flex: 1; min-width: 140px; }
  .wt-date::-webkit-calendar-picker-indicator { filter: invert(1); }

  .wt-days { display: flex; gap: 8px; margin-bottom: 16px; }
  .wt-day-btn { flex: 1; background: var(--surface); border: 1px solid var(--line); border-radius: 10px; padding: 10px 8px; cursor: pointer; text-align: left; transition: border-color 0.15s, background 0.15s; }
  .wt-day-btn.active { border-color: var(--accent); background: var(--accent-soft); }
  .wt-day-label { font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 14px; letter-spacing: 0.06em; text-transform: uppercase; }
  .wt-day-btn.active .wt-day-label { color: var(--accent); }
  .wt-day-sub { font-size: 11.5px; color: var(--muted); margin-top: 2px; }

  .wt-bar-wrap { display: flex; align-items: center; gap: 6px; margin-bottom: 18px; padding: 0 2px; }
  .wt-bar-track { flex: 1; height: 4px; background: var(--line); border-radius: 2px; position: relative; overflow: hidden; }
  .wt-bar-fill { position: absolute; inset: 0; background: var(--accent); border-radius: 2px; transition: width 0.3s ease; }
  .wt-bar-count { font-family: 'Oswald', sans-serif; font-size: 12px; color: var(--muted); letter-spacing: 0.04em; white-space: nowrap; }

  .wt-collapsible { background: var(--surface); border: 1px solid var(--line); border-radius: 10px; margin-bottom: 12px; overflow: hidden; }
  .wt-collapsible-head { display: flex; justify-content: space-between; align-items: center; padding: 11px 14px; cursor: pointer; user-select: none; }
  .wt-collapsible-title { font-family: 'Oswald', sans-serif; font-size: 12.5px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
  .wt-collapsible-chevron { color: var(--muted); font-size: 14px; transition: transform 0.2s; display: inline-block; }
  .wt-collapsible-chevron.open { transform: rotate(180deg); }
  .wt-collapsible-body { padding: 0 14px 13px; font-size: 13.5px; color: var(--muted); line-height: 1.5; }
  .wt-bullets { margin: 0; padding-left: 18px; }
  .wt-bullets li { margin-bottom: 4px; }
  .wt-bullets li:last-child { margin-bottom: 0; }

  .wt-exercise-last { font-size: 11.5px; color: var(--muted); margin-top: 3px; }
  .wt-video-link {
    flex-shrink: 0;
    width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--line);
    border-radius: 50%;
    color: var(--muted);
    text-decoration: none;
    font-size: 12px;
    transition: border-color 0.15s, color 0.15s;
  }
  .wt-video-link:hover { border-color: var(--accent); color: var(--accent); }

  .wt-exercise { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 14px; margin-bottom: 10px; transition: border-color 0.2s; }
  .wt-exercise.saved { border-color: rgba(74, 222, 128, 0.35); }
  .wt-exercise-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 10px; }
  .wt-exercise-name { font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 16px; letter-spacing: 0.01em; }
  .wt-exercise-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .wt-exercise-note { font-size: 11px; color: var(--accent); margin-top: 3px; font-style: italic; }

  .wt-field-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .wt-field label { display: block; font-size: 10.5px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .wt-field input { width: 100%; background: var(--surface-2); border: 1px solid var(--line); border-radius: 7px; color: var(--text); padding: 9px 10px; font-size: 16px; font-family: 'Inter', sans-serif; }
  .wt-field input:focus { outline: none; border-color: var(--accent); }
  .wt-notes-row { display: flex; gap: 8px; align-items: flex-end; }
  .wt-notes-row .wt-field { flex: 1; }

  .wt-log-btn { background: var(--accent); color: #1a0f0b; border: none; border-radius: 7px; padding: 9px 16px; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 14px; cursor: pointer; white-space: nowrap; transition: filter 0.15s, transform 0.05s; }
  .wt-log-btn:active { transform: scale(0.97); }
  .wt-log-btn:hover { filter: brightness(1.08); }
  .wt-log-btn.saved { background: var(--good-soft); color: var(--good); border: 1px solid rgba(74, 222, 128, 0.35); }

  .wt-video-link { background: none; }

  .wt-modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
    padding: 24px;
  }
  .wt-modal {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px;
    max-width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .wt-modal-gif {
    max-width: 100%;
    max-height: 60vh;
    border-radius: 8px;
    display: block;
  }
  .wt-modal-close {
    background: var(--accent);
    color: #1a0f0b;
    border: none;
    border-radius: 7px;
    padding: 8px 20px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
  }

  @media (max-width: 380px) {
    .wt-title { font-size: 22px; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

const CLIENT_ID = '888845567536-3j8e4gi1nsrjt97bknifavfjsdn1mk35.apps.googleusercontent.com';
const API_KEY = 'AIzaSyBaAVdujpClzPyku9pU6Nfk-vRboVJmr94';
const SPREADSHEET_ID = '1CvxPW3qPg_2bwb7MwDW9L2G6Q-uR8Lvl1MTYfwztD-o';
const SHEET_RANGE = 'Sheet1!A:G';
const SCOPES = 'https://www.googleapis.com/auth/spreadsheets';

const PLAN = {
  day1: {
    label: 'Day 1',
    sub: 'Lower + Push',
    warmup: 'Bike 3 min easy · 90/90 hip stretch ×60s each side · thoracic rotations ×10 each side · glute bridges ×15',
    finisher: 'Row machine — 40 sec hard / 20 sec easy × 8 rounds',
    exercises: [
      { id: 'd1-1', name: 'Deadlift', scheme: '3 × 8–10', rest: '90 sec rest', video: 'https://exrx.net/WeightExercises/GluteusMaximus/BBDeadlift', gif: 'https://exrx.net/application/files/4714/3885/0262/BBDeadlift.gif' },
      { id: 'd1-2', name: 'Barbell Squat', scheme: '3 × 12–15', rest: '75 sec rest', video: 'https://exrx.net/WeightExercises/Quadriceps/BBSquat' },
      { id: 'd1-3', name: 'Incline Dumbbell Press', scheme: '3 × 12–15', rest: '75 sec rest', video: 'https://exrx.net/WeightExercises/PectoralClavicular/DBInclineBenchPress' },
      { id: 'd1-4', name: 'Cable Rotation', scheme: '3 × 12 each side', rest: '60 sec rest', video: 'https://exrx.net/WeightExercises/Obliques/CBUpDownTwist' },
      { id: 'd1-5', name: 'Seated Cable Row', scheme: '3 × 12–15', rest: '75 sec rest', video: 'https://exrx.net/WeightExercises/BackGeneral/CBSeatedRow' },
      { id: 'd1-6', name: 'Pallof Press', scheme: '3 × 12 each side', rest: '60 sec rest' },
    ],
  },
  day2: {
    label: 'Day 2',
    sub: 'Pull + Hips',
    warmup: 'Bike 3 min easy · hip flexor stretch ×60s each side · lateral leg swings ×10 each · band pull-aparts ×15',
    finisher: 'Bike — 40 sec hard / 20 sec easy × 8 rounds',
    exercises: [
      { id: 'd2-1', name: 'Lat Pulldown', scheme: '3 × 12–15', rest: '75 sec rest' },
      { id: 'd2-2', name: 'Dumbbell Hip Thrust', scheme: '3 × 12–15', rest: '90 sec rest' },
      { id: 'd2-3', name: 'Step-Up', scheme: '3 × 10 each leg', rest: '90 sec rest' },
      { id: 'd2-4', name: 'Standing Cable Rotation', scheme: '3 × 10 each side', rest: '75 sec rest', note: 'swapped from med ball throw' },
      { id: 'd2-5', name: 'Chest-Supported DB Row', scheme: '3 × 12–15', rest: '75 sec rest' },
      { id: 'd2-6', name: 'Cable Face Pull', scheme: '3 × 15', rest: '60 sec rest' },
      { id: 'd2-7', name: 'Dead Bug', scheme: '3 × 8 each side', rest: '60 sec rest' },
    ],
  },
  day3: {
    label: 'Day 3',
    sub: 'Posterior + Core',
    warmup: "Row 3 min easy · world's greatest stretch ×5 each side · thoracic rotations ×10 each side · leg swings ×10 each direction",
    finisher: 'Incline treadmill walk — 3.5–4 mph, 8–10% incline',
    exercises: [
      { id: 'd3-1', name: 'Romanian Deadlift', scheme: '3 × 10–12', rest: '90 sec rest' },
      { id: 'd3-2', name: 'Dumbbell Flat Bench Press', scheme: '3 × 12–15', rest: '75 sec rest' },
      { id: 'd3-3', name: 'Seated Leg Curl', scheme: '3 × 12–15', rest: '75 sec rest' },
      { id: 'd3-4', name: 'Half-Kneeling Cable Chop', scheme: '3 × 10 each side', rest: '75 sec rest' },
      { id: 'd3-5', name: 'Single-Arm DB Row', scheme: '3 × 12 each side', rest: '75 sec rest' },
      { id: 'd3-6', name: 'Dumbbell Shoulder Press', scheme: '3 × 12–15', rest: '75 sec rest' },
      { id: 'd3-7', name: 'Plank w/ Shoulder Tap', scheme: '3 × 10 each side', rest: '60 sec rest' },
    ],
  },
};

function todayISO() {
  const d = new Date();
  const off = d.getTimezoneOffset();
  return new Date(d.getTime() - off * 60000).toISOString().slice(0, 10);
}

function BulletList({ text }) {
  const items = text.split('·').map((s) => s.trim()).filter(Boolean);
  return (
    <ul className="wt-bullets">
      {items.map((item, i) => <li key={i}>{item}</li>)}
    </ul>
  );
}

function Collapsible({ title, children, open, onToggle }) {
  const [localOpen, setLocalOpen] = useState(false);
  const isOpen = onToggle ? open : localOpen;
  const toggle = onToggle || (() => setLocalOpen(!localOpen));
  return (
    <div className="wt-collapsible">
      <div className="wt-collapsible-head" onClick={toggle}>
        <span className="wt-collapsible-title">{title}</span>
        <span className={`wt-collapsible-chevron ${isOpen ? 'open' : ''}`}>⌄</span>
      </div>
      {isOpen && <div className="wt-collapsible-body">{children}</div>}
    </div>
  );
}

function App() {
  const [dayKey, setDayKey] = useState('day1');
  const [date, setDate] = useState(todayISO());
  const [logs, setLogs] = useState({});
  const [warmupOpen, setWarmupOpen] = useState(false);
  const [signedIn, setSignedIn] = useState(false);
  const [apiReady, setApiReady] = useState(false);
  const [gisReady, setGisReady] = useState(false);
  const [lastWeights, setLastWeights] = useState({});
  const [modalGif, setModalGif] = useState(null);
  const [status, setStatus] = useState(null);
  const tokenClientRef = useRef(null);

  useEffect(() => {
    let cancelled = false;

    const gapiScript = document.createElement('script');
    gapiScript.src = 'https://apis.google.com/js/api.js';
    gapiScript.async = true;
    gapiScript.defer = true;
    gapiScript.onload = () => {
      if (cancelled) return;
      window.gapi.load('client', async () => {
        try {
          await window.gapi.client.init({
            apiKey: API_KEY,
            discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4'],
          });
          if (!cancelled) setApiReady(true);
        } catch (e) {
          if (!cancelled) setStatus({ type: 'error', text: 'Could not load Google Sheets API.' });
        }
      });
    };
    gapiScript.onerror = () => {
      if (!cancelled) setStatus({ type: 'error', text: 'Failed to load Google API script.' });
    };
    document.body.appendChild(gapiScript);

    const gisScript = document.createElement('script');
    gisScript.src = 'https://accounts.google.com/gsi/client';
    gisScript.async = true;
    gisScript.defer = true;
    gisScript.onload = () => {
      if (cancelled) return;
      tokenClientRef.current = window.google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: (resp) => {
          if (resp && resp.access_token) {
            window.gapi.client.setToken(resp);
            setSignedIn(true);
            setStatus({ type: 'success', text: 'Connected to your sheet.' });
          }
        },
      });
      setGisReady(true);
    };
    gisScript.onerror = () => {
      if (!cancelled) setStatus({ type: 'error', text: 'Failed to load Google sign-in script.' });
    };
    document.body.appendChild(gisScript);

    return () => { cancelled = true; };
  }, []);

  const connect = () => {
    if (tokenClientRef.current) {
      tokenClientRef.current.requestAccessToken({ prompt: signedIn ? '' : 'consent' });
    } else {
      setStatus({ type: 'error', text: 'Still loading — try again in a moment.' });
    }
  };

  // Try a silent reconnect once Google Identity Services is ready.
  // If you previously granted access and your Google session is still
  // active, this can refresh the token without showing a popup.
  useEffect(() => {
    if (gisReady && tokenClientRef.current) {
      tokenClientRef.current.requestAccessToken({ prompt: '' });
    }
  }, [gisReady]);

  // Proactively refresh the token before it expires (~1 hour).
  useEffect(() => {
    if (!signedIn) return;
    const interval = setInterval(() => {
      if (tokenClientRef.current) {
        tokenClientRef.current.requestAccessToken({ prompt: '' });
      }
    }, 45 * 60 * 1000);
    return () => clearInterval(interval);
  }, [signedIn]);

  // Once connected, pull the sheet and find the most recent weight logged per exercise.
  useEffect(() => {
    if (!signedIn) return;
    (async () => {
      try {
        const res = await window.gapi.client.sheets.spreadsheets.values.get({
          spreadsheetId: SPREADSHEET_ID,
          range: SHEET_RANGE,
        });
        const rows = (res.result.values || []).slice(1); // skip header
        const map = {};
        rows.forEach((row) => {
          const [rowDate, , exName, , , weight] = row;
          if (exName && weight) {
            map[exName] = { weight, date: rowDate };
          }
        });
        setLastWeights(map);
      } catch (e) {
        // non-critical, fail quietly
      }
    })();
  }, [signedIn]);

  const updateField = (id, field, value) => {
    setLogs((prev) => ({
      ...prev,
      [id]: { ...prev[id], [field]: value, saved: false },
    }));
  };

  const logExercise = async (ex) => {
    if (!signedIn) {
      setStatus({ type: 'error', text: 'Connect to Google Sheets first.' });
      return;
    }
    const entry = logs[ex.id] || {};
    const row = [
      date,
      PLAN[dayKey].label,
      ex.name,
      entry.sets || '',
      entry.reps || '',
      entry.weight || '',
      entry.notes || '',
    ];
    setStatus({ type: 'pending', text: `Saving ${ex.name}…` });
    try {
      await window.gapi.client.sheets.spreadsheets.values.append({
        spreadsheetId: SPREADSHEET_ID,
        range: SHEET_RANGE,
        valueInputOption: 'USER_ENTERED',
        insertDataOption: 'INSERT_ROWS',
        resource: { values: [row] },
      });
      setLogs((prev) => ({ ...prev, [ex.id]: { ...prev[ex.id], saved: true } }));
      if (entry.weight) {
        setLastWeights((prev) => ({ ...prev, [ex.name]: { weight: entry.weight, date } }));
      }
      setStatus({ type: 'success', text: `${ex.name} logged.` });
    } catch (e) {
      const reason = e && e.result && e.result.error ? e.result.error.message : 'Unknown error';
      setStatus({ type: 'error', text: `Couldn't save ${ex.name}: ${reason}` });
    }
  };

  const plan = PLAN[dayKey];
  const loggedCount = plan.exercises.filter((ex) => logs[ex.id] && logs[ex.id].saved).length;

  return (
    <div className="wt-root">
      <div className="wt-header">
        <h1 className="wt-title">Bench<span>marks</span></h1>
        <a
          className="wt-sheet-link"
          href={`https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/edit`}
          target="_blank"
          rel="noopener noreferrer"
        >
          View sheet ↗
        </a>
      </div>

      <div className="wt-connect-row">
        <button
          className={`wt-connect-btn ${signedIn ? 'connected' : 'disconnected'}`}
          onClick={connect}
          disabled={!apiReady}
        >
          {!apiReady ? 'Loading…' : signedIn ? '● Connected' : 'Connect to Google Sheets'}
        </button>
      </div>

      {status && <div className={`wt-status ${status.type}`}>{status.text}</div>}

      <div className="wt-controls">
        <input className="wt-date" type="date" value={date} onChange={(e) => setDate(e.target.value)} />
      </div>

      <div className="wt-days">
        {Object.entries(PLAN).map(([key, d]) => (
          <button key={key} className={`wt-day-btn ${dayKey === key ? 'active' : ''}`} onClick={() => setDayKey(key)}>
            <div className="wt-day-label">{d.label}</div>
            <div className="wt-day-sub">{d.sub}</div>
          </button>
        ))}
      </div>

      <div className="wt-bar-wrap">
        <div className="wt-bar-track">
          <div className="wt-bar-fill" style={{ width: `${(loggedCount / plan.exercises.length) * 100}%` }} />
        </div>
        <div className="wt-bar-count">{loggedCount}/{plan.exercises.length} logged</div>
      </div>

      <Collapsible title="Warm-up (7 min)" open={warmupOpen} onToggle={() => setWarmupOpen(!warmupOpen)}>
        <BulletList text={plan.warmup} />
      </Collapsible>

      {plan.exercises.map((ex) => {
        const entry = logs[ex.id] || {};
        return (
          <div key={ex.id} className={`wt-exercise ${entry.saved ? 'saved' : ''}`}>
            <div className="wt-exercise-head">
              <div>
                <div className="wt-exercise-name">{ex.name}</div>
                <div className="wt-exercise-meta">{ex.scheme} · {ex.rest}</div>
                {lastWeights[ex.name] && (
                  <div className="wt-exercise-last">Last: {lastWeights[ex.name].weight} lbs ({lastWeights[ex.name].date})</div>
                )}
                {ex.note && <div className="wt-exercise-note">{ex.note}</div>}
              </div>
              {ex.gif ? (
                <button className="wt-video-link" onClick={() => setModalGif(ex.gif)} title="Form demo">▶</button>
              ) : (
                <a
                  className="wt-video-link"
                  href={ex.video || `https://www.youtube.com/results?search_query=${encodeURIComponent(ex.name + ' exercise form')}`}
                  target="_blank"
                  rel="noopener noreferrer"
                  title="Form video"
                >▶</a>
              )}
            </div>
            <div className="wt-field-grid">
              <div className="wt-field">
                <label>Sets</label>
                <input type="text" inputMode="numeric" placeholder={ex.scheme.split('×')[0].trim()} value={entry.sets || ''} onChange={(e) => updateField(ex.id, 'sets', e.target.value)} />
              </div>
              <div className="wt-field">
                <label>Reps</label>
                <input type="text" placeholder={ex.scheme.split('×')[1] ? ex.scheme.split('×')[1].trim() : ''} value={entry.reps || ''} onChange={(e) => updateField(ex.id, 'reps', e.target.value)} />
              </div>
              <div className="wt-field">
                <label>Weight</label>
                <input type="text" inputMode="decimal" placeholder="lbs" value={entry.weight || ''} onChange={(e) => updateField(ex.id, 'weight', e.target.value)} />
              </div>
            </div>
            <div className="wt-notes-row">
              <div className="wt-field">
                <label>Notes</label>
                <input type="text" placeholder="" value={entry.notes || ''} onChange={(e) => updateField(ex.id, 'notes', e.target.value)} />
              </div>
              <button className={`wt-log-btn ${entry.saved ? 'saved' : ''}`} onClick={() => logExercise(ex)}>
                {entry.saved ? '✓ Logged' : 'Log'}
              </button>
            </div>
          </div>
        );
      })}

      <Collapsible title="Finisher (8 min)" open={false}>
        <BulletList text={plan.finisher} />
      </Collapsible>

      {modalGif && (
        <div className="wt-modal-overlay" onClick={() => setModalGif(null)}>
          <div className="wt-modal" onClick={(e) => e.stopPropagation()}>
            <img src={modalGif} alt="Exercise form demo" className="wt-modal-gif" />
            <button className="wt-modal-close" onClick={() => setModalGif(null)}>Close</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
